name: e2eTest

on:
  pull_request

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # NextAuth
      NEXTAUTH_SECRET: test-secret-for-e2e-testing-only
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_DEFAULT_PROVIDER: credentials
      # データベース（CI用ローカルPostgreSQL）
      # 127.0.0.1を使用（localhostだとIPv6解決される場合がありservice containerに繋がらないため）
      POSTGRES_PRISMA_URL: postgresql://postgres:postgrespassword@127.0.0.1:5432/e2e_test
      POSTGRES_URL_NON_POOLING: postgresql://postgres:postgrespassword@127.0.0.1:5432/e2e_test
      # Azure AD（E2Eでは credentials プロバイダーを使用するため未使用だが起動エラー防止のため設定）
      AZURE_AD_TENANT_ID: dummy-tenant-id
      AZURE_AD_CLIENT_ID: dummy-client-id
      AZURE_AD_CLIENT_SECRET: dummy-client-secret
      AZURE_AD_B2C_TENANT_NAME: dummy
      AZURE_AD_B2C_CLIENT_ID: dummy-b2c-client-id
      AZURE_AD_B2C_CLIENT_SECRET: dummy-b2c-secret
      AZURE_AD_B2C_PRIMARY_USER_FLOW: B2C_1_dummy

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: volta-cli/action@615a78f6c83e116339c53b94f3f82b4d6c0b7d18 # v5

      - name: 依存関係をインストール
        run: yarn install --immutable

      - name: Prismaクライアントを生成
        run: yarn db:generate

      - name: 診断情報を収集
        run: |
          {
            echo "## 診断情報"
            echo ""
            echo "### PostgreSQL container"
            echo '```'
            docker ps --filter "ancestor=postgres:18" --format "{{.ID}} {{.Status}} {{.Ports}}" 2>&1 || echo "docker ps failed"
            echo '```'
            echo "### PostgreSQL接続テスト"
            echo '```'
            PGPASSWORD=postgrespassword psql -h 127.0.0.1 -U postgres -d e2e_test -c 'SELECT version();' 2>&1 || echo "psql failed"
            echo '```'
            echo "### Prismaバージョン"
            echo '```'
            yarn prisma --version 2>&1 || echo "prisma --version failed"
            echo '```'
            echo "### 環境変数"
            echo '```'
            echo "POSTGRES_PRISMA_URL=$POSTGRES_PRISMA_URL"
            echo "POSTGRES_URL_NON_POOLING=$POSTGRES_URL_NON_POOLING"
            echo '```'
          } | tee -a $GITHUB_STEP_SUMMARY

      - name: データベーススキーマを適用
        run: |
          {
            echo "## prisma db push 出力"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
          set +e
          yarn prisma db push --skip-generate 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          EXIT_CODE=${PIPESTATUS[0]}
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Exit code: $EXIT_CODE" >> $GITHUB_STEP_SUMMARY
          exit $EXIT_CODE
        env:
          DEBUG: 'prisma:*'

      - name: シードデータを投入
        run: yarn tsx prisma/seed.ts

      - name: Playwrightブラウザをインストール
        run: yarn playwright install --with-deps chromium

      - name: E2Eテストを実行
        run: yarn e2e

      - name: テストレポート（動画含む）をアップロード
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: テスト生ファイル（動画・トレース）をアップロード
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
